services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rag_algo_solver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_algo_solver"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
